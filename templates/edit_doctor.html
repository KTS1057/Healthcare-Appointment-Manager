{% extends "layout.html" %}

{% block title %}Edit Doctor{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header bg-warning text-dark">

                <h3>

                    <i class="bi bi-pencil-square"></i>

                    Edit Doctor

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Doctor Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="name"
                                value="{{ doctor.name }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Specialization
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="specialization"
                                value="{{ doctor.specialization }}"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Experience
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="experience"
                                value="{{ doctor.experience }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Slot Duration
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                name="slot_duration"
                                value="{{ doctor.slot_duration }}"
                                required>

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Working Hours
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="working_hours"
                            value="{{ doctor.working_hours }}"
                            required>

                    </div>

                    <div class="d-grid gap-2 d-md-flex">

                        <button class="btn btn-warning">

                            <i class="bi bi-check-circle-fill"></i>

                            Update Doctor

                        </button>

                        <a href="{{ url_for('view_doctors') }}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left-circle-fill"></i>

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
