{% extends "layout.html" %}

{% block title %}View Patients{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            <i class="bi bi-people-fill"></i>
            Registered Patients
        </h2>

        <a href="{{ url_for('admin') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i>
            Dashboard
        </a>

    </div>

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">

                Patients List

            </h4>

        </div>

        <div class="card-body">

            <input
                type="text"
                id="searchPatient"
                class="form-control mb-3"
                placeholder="Search by Name or Email">

            <div class="table-responsive">

                <table class="table table-striped table-hover" id="patientTable">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for patient in patients %}

                        <tr>

                            <td>{{ patient.id }}</td>

                            <td>{{ patient.name }}</td>

                            <td>{{ patient.email }}</td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

document.getElementById("searchPatient").addEventListener("keyup", function(){

    let filter = this.value.toLowerCase();

    let rows = document.querySelectorAll("#patientTable tbody tr");

    rows.forEach(function(row){

        let text = row.innerText.toLowerCase();

        row.style.display = text.includes(filter) ? "" : "none";

    });

});

</script>

{% endblock %}
